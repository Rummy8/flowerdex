<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FlowerDex">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1a0f">
<meta name="description" content="Offline botanical field scanner">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>FlowerDex</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js" defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1a0f;--surface:#1a2e1a;--border:#2a4a2a;
  --accent:#5a9e3a;--light:#a8d878;--pale:#c8f0a0;
  --muted:#6a8a6a;--dim:#4a7a4a;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
body{background:var(--bg);color:#e8f0e8;font-family:'Georgia',serif;min-height:100dvh;overscroll-behavior:none;-webkit-overflow-scrolling:touch;user-select:none}
.app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

/* Header */
.header{background:var(--bg);padding:calc(var(--safe-t) + 10px) 16px 0;text-align:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.logo{font-size:24px;color:var(--light);letter-spacing:4px;font-weight:bold}
.logo-sub{font-size:9px;color:var(--dim);letter-spacing:5px;margin-bottom:10px}
.tabs{display:flex;justify-content:center}
.tab{background:none;border:none;padding:10px 28px;font-size:12px;cursor:pointer;font-family:'Georgia',serif;letter-spacing:2px;border-bottom:2px solid transparent;color:var(--muted);transition:all .2s;-webkit-appearance:none}
.tab.active{color:var(--light);border-bottom-color:var(--light)}
.badge{background:var(--border);color:var(--light);border-radius:10px;padding:1px 7px;font-size:10px;margin-left:5px}

/* Content */
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(var(--safe-b) + 88px)}

/* Model overlay */
.model-overlay{position:fixed;inset:0;background:rgba(10,18,10,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:20px}
.model-overlay.hidden{display:none}
.spinner{width:56px;height:56px;border:3px solid var(--border);border-top-color:var(--light);border-radius:50%;animation:spin .9s linear infinite}
.model-label{color:var(--light);font-size:13px;letter-spacing:3px}
.model-sub{color:var(--dim);font-size:11px;letter-spacing:1px;text-align:center;padding:0 20px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Stats */
.stats-bar{display:flex;gap:10px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.stat{flex:1;text-align:center}
.stat-val{font-size:20px;color:var(--pale);font-weight:bold}
.stat-key{font-size:9px;color:var(--dim);letter-spacing:1.5px;margin-top:2px}

/* Filters */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'Georgia',serif;transition:all .15s;-webkit-appearance:none}
.chip.active{background:var(--border);border-color:var(--accent);color:var(--pale)}

/* Gallery */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.97)}
.card img{width:100%;height:110px;object-fit:cover;display:block}
.card-body{padding:8px 10px 10px}
.card-rarity{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:bold;margin-bottom:4px;letter-spacing:.5px}
.card-name{font-size:13px;color:var(--pale);line-height:1.3;margin-bottom:1px}
.card-conf{font-size:10px;color:var(--dim);margin-bottom:2px}
.card-date{font-size:10px;color:#3a5a3a}

/* Empty */
.empty{text-align:center;padding:60px 20px}
.empty .icon{font-size:52px;margin-bottom:16px}
.empty-title{color:var(--dim);font-size:16px;letter-spacing:1px}
.empty-sub{color:#3a5a3a;font-size:13px;margin-top:8px}

/* FAB */
.fab{position:fixed;bottom:calc(var(--safe-b) + 22px);left:50%;transform:translateX(-50%);background:var(--accent);border:none;border-radius:50%;width:68px;height:68px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(90,158,58,.5);transition:all .15s;z-index:30;-webkit-appearance:none}
.fab:active{transform:translateX(-50%) scale(.93)}
.fab.hidden{display:none}

/* Scanner */
.scanner{display:flex;flex-direction:column;gap:14px}
.viewfinder{background:#0a120a;border-radius:16px;border:1px solid var(--border);aspect-ratio:4/3;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.viewfinder img.preview{width:100%;height:100%;object-fit:cover;display:block}
.vf-placeholder{text-align:center}
.vf-placeholder .icon{font-size:52px;margin-bottom:10px}
.vf-placeholder p{color:var(--dim);font-size:13px;line-height:1.6}
.corner{position:absolute;width:22px;height:22px;border-color:var(--accent);border-style:solid;pointer-events:none}
.c-tl{top:10px;left:10px;border-width:2px 0 0 2px}
.c-tr{top:10px;right:10px;border-width:2px 2px 0 0}
.c-bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
.c-br{bottom:10px;right:10px;border-width:0 2px 2px 0}
.vf-scanning{position:absolute;inset:0;background:rgba(0,20,0,.75);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.vf-scanning .spinner{width:48px;height:48px}
.vf-scanning span{color:var(--light);font-size:13px;letter-spacing:3px}

.scan-actions{display:flex;gap:10px}
.btn{flex:1;background:var(--border);border:1.5px solid var(--accent);color:var(--pale);padding:14px;border-radius:24px;font-size:14px;cursor:pointer;font-family:'Georgia',serif;letter-spacing:1px;text-align:center;transition:all .15s;-webkit-appearance:none}
.btn:active{transform:scale(.97);background:#3a6a22}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--muted);flex:none;padding:14px 18px}

.alert{background:#2a1a0a;border:1px solid #5a3a1a;border-radius:10px;padding:10px 14px;color:#f0a060;font-size:13px;line-height:1.5}

/* Result */
.result-card{background:var(--surface);border-radius:16px;overflow:hidden;border:1.5px solid var(--border)}
.result-img-wrap{position:relative}
.result-img-wrap img{width:100%;height:190px;object-fit:cover;display:block}
.badge-overlay{position:absolute;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:bold;letter-spacing:1px}
.badge-r{top:10px;right:10px}
.badge-l{top:10px;left:10px}
.result-body{padding:16px}
.flower-name{font-size:20px;color:var(--pale);margin-bottom:4px;letter-spacing:1px}
.conf-bar-wrap{background:var(--border);border-radius:4px;height:6px;overflow:hidden}
.conf-bar{height:100%;border-radius:4px;transition:width .6s ease}
.flower-desc{font-size:13px;color:#a0c080;line-height:1.7;margin:12px 0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.info-cell{background:var(--bg);border-radius:8px;padding:8px 12px}
.info-label{font-size:9px;color:var(--dim);letter-spacing:1.5px;margin-bottom:3px}
.info-val{font-size:12px;color:#8ab878;line-height:1.4}
.fun-fact{background:var(--bg);border-radius:8px;padding:10px 12px;border-left:3px solid}
.fun-fact p{font-size:12px;color:#8ab878;line-height:1.6}
.top-preds{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.pred-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.pred-row span:first-child{flex:1;text-transform:capitalize}
.pred-mini-bar{height:4px;border-radius:2px;background:var(--border);flex:2;overflow:hidden}
.pred-mini-fill{height:100%;border-radius:2px;background:var(--accent)}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;display:flex;align-items:flex-end}
.modal-backdrop.hidden{display:none}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:90dvh;overflow-y:auto;padding-bottom:calc(var(--safe-b) + 16px)}
.modal-img-wrap{position:relative}
.modal-img-wrap img{width:100%;height:220px;object-fit:cover;display:block;border-radius:24px 24px 0 0}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:20px}
.modal-date{font-size:11px;color:#3a5a3a;text-align:right;margin-top:10px}
.delete-btn{width:100%;margin-top:14px;background:transparent;border:1px solid #5a2a2a;color:#f08080;padding:10px;border-radius:12px;font-size:12px;cursor:pointer;font-family:'Georgia',serif;letter-spacing:1px}

/* Install banner */
.install-banner{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted)}
.install-banner button{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;flex-shrink:0;padding:0 4px;margin-left:auto}

/* Toast */
.toast{position:fixed;top:calc(var(--safe-t) + 14px);left:50%;transform:translateX(-50%) translateY(-70px);z-index:200;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:bold;letter-spacing:.5px;white-space:nowrap;transition:transform .35s cubic-bezier(.175,.885,.32,1.275);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">FLOWERDEX</div>
    <div class="logo-sub">BOTANICAL FIELD CODEX</div>
    <div class="tabs">
      <button class="tab active" id="tab-col"  onclick="setView('collection')">COLLECTION <span class="badge" id="col-badge" style="display:none">0</span></button>
      <button class="tab"        id="tab-scan" onclick="setView('scanner')">SCANNER</button>
    </div>
  </div>
  <div class="content" id="content"></div>
  <button class="fab" id="fab" onclick="fabTap()">🌿</button>
</div>

<div class="model-overlay" id="model-overlay">
  <div class="spinner"></div>
  <div class="model-label">LOADING MODEL</div>
  <div class="model-sub">First run downloads ~17 MB<br>Fully cached offline after this</div>
</div>

<div class="modal-backdrop hidden" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-img-wrap">
      <img id="m-img" src="" alt="">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <span class="badge-overlay badge-r" id="m-rarity"></span>
    </div>
    <div class="modal-body">
      <div class="flower-name" id="m-name"></div>
      <div id="m-conf" style="margin-bottom:12px"></div>
      <div class="flower-desc" id="m-desc"></div>
      <div class="info-grid">
        <div class="info-cell"><div class="info-label">HABITAT</div><div class="info-val" id="m-habitat"></div></div>
        <div class="info-cell"><div class="info-label">BLOOMS</div><div class="info-val" id="m-blooms"></div></div>
      </div>
      <div class="fun-fact" id="m-fact-box">
        <div class="info-label">FUN FACT</div>
        <p id="m-fact"></p>
      </div>
      <div class="modal-date" id="m-date"></div>
      <button class="delete-btn" onclick="deleteActive()">Remove from collection</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input id="file-cam" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleFile(event)">
<input id="file-lib" type="file" accept="image/*"                       style="display:none" onchange="handleFile(event)">

<script>
/* ── Storage ── */
const STORAGE_KEY = 'flowerdex-v2';

/* ── Rarity ── */
const RARITIES = ['Common','Uncommon','Rare','Very Rare','Legendary'];
const RC = { Common:'#7aaa5c', Uncommon:'#4db8d4', Rare:'#c084fc', 'Very Rare':'#fb923c', Legendary:'#fbbf24' };
function hash(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))|0; return Math.abs(h); }
function getRarity(n){ const h=hash(n)%20; return h<8?RARITIES[0]:h<13?RARITIES[1]:h<17?RARITIES[2]:h<19?RARITIES[3]:RARITIES[4]; }

/* ── Flower DB ── curated info for ImageNet plant labels ── */
const DB = {
  daisy:      {sci:'Bellis perennis',    family:'Asteraceae',    habitat:'Meadows & lawns',            bloom:'Spring–Autumn',    desc:'The humble daisy is one of the world\'s most recognisable wildflowers, carpeting grasslands across Europe and beyond with its white ray petals and golden disc.',                fact:'The name comes from Old English "daæges ēage" — eye of the day — as it opens at dawn and closes at dusk.'},
  sunflower:  {sci:'Helianthus annuus',  family:'Asteraceae',    habitat:'Open fields & roadsides',    bloom:'Summer–Autumn',    desc:'Native to North America, the sunflower can exceed 3 m in height and produces a flower head containing up to 2,000 seeds arranged in a Fibonacci spiral.',                        fact:'Young sunflowers track the sun from east to west daily — heliotropism — but stop once they mature.'},
  rose:       {sci:'Rosa',              family:'Rosaceae',      habitat:'Gardens & hedgerows',         bloom:'Late spring–Autumn',desc:'Cultivated for over 5,000 years, roses exist in 300 wild species and tens of thousands of cultivars. Their layered petals and complex fragrance make them icons of beauty.',  fact:'Rose hips — the fruit left after petals fall — contain up to 20× more vitamin C than oranges.'},
  rapeseed:   {sci:'Brassica napus',    family:'Brassicaceae',  habitat:'Farmland',                   bloom:'Spring',           desc:'Rapeseed paints the countryside brilliant yellow in spring. It is one of the world\'s most important oil-seed crops, also refined into canola oil and biofuel.',               fact:'A single rapeseed plant can produce thousands of seeds, each containing around 40% oil by weight.'},
  dandelion:  {sci:'Taraxacum officinale',family:'Asteraceae',  habitat:'Lawns, roadsides & waste ground',bloom:'Year-round',   desc:'The dandelion thrives in almost any disturbed ground. Its bright yellow heads and iconic seed clocks are beloved by pollinators and children alike.',                               fact:'Every part of the dandelion is edible — the roots can even be roasted as a coffee substitute.'},
  tulip:      {sci:'Tulipa',            family:'Liliaceae',     habitat:'Mountain meadows & gardens',  bloom:'Spring',           desc:'Originating in Central Asia, tulips triggered one of history\'s first financial bubbles — "Tulip Mania" — in 17th-century Holland when single bulbs sold for a fortune.',   fact:'Tulip bulbs were used as food substitutes by starving Dutch citizens during World War II.'},
  orchid:     {sci:'Orchidaceae',       family:'Orchidaceae',   habitat:'Tropical to temperate globally',bloom:'Varies by species',desc:'Orchids form the largest family of flowering plants with over 28,000 species. They have evolved extraordinarily elaborate flowers to attract specific pollinators.',       fact:'Vanilla flavouring comes from the seed pods of a tropical orchid, Vanilla planifolia.'},
  anemone:    {sci:'Anemone',           family:'Ranunculaceae', habitat:'Woodland edges & alpine meadows',bloom:'Spring–Autumn', desc:'Wind flowers produce delicate cup-shaped blooms in vivid reds, purples and whites. They spread via wind-dispersed seeds and underground rhizomes.',                         fact:'The name comes from Greek "anemos" (wind) — ancients believed the flowers only opened when the wind blew.'},
  hibiscus:   {sci:'Hibiscus',          family:'Malvaceae',     habitat:'Tropical & subtropical regions',bloom:'Year-round',     desc:'Hibiscus produces spectacular flowers often reaching 30 cm across. Each bloom lasts only a single day, but a healthy plant produces them continuously.',                       fact:'Hibiscus tea — made from dried flowers rich in antioxidants — is consumed daily by millions worldwide.'},
};

const HABITATS = ['Open woodland edges','Sunny meadows','Rocky slopes','Wetland margins','Coastal grassland'];
const BLOOMS   = ['Spring','Summer','Late summer','Autumn','Spring–Summer'];
function genericInfo(label){
  const h = hash(label);
  return { sci:label.charAt(0).toUpperCase()+label.slice(1)+' sp.', family:'Unclassified',
    habitat:HABITATS[h%HABITATS.length], bloom:BLOOMS[h%BLOOMS.length],
    desc:`Classified as "${label}" by the MobileNet AI model. For species-level flower ID, the Oxford 102 Flowers model (your next upgrade) knows 102 specific species.`,
    fact:'The MobileNet model was trained on 1,000 ImageNet categories — perfect for proving the pipeline before swapping in a specialised flower model.' };
}

/* ── State ── */
let tfModel    = null;
let collection = [];
let view       = 'collection';
let filter     = 'All';
let scanning   = false;
let previewSrc = null;
let lastResult = null;
let activeId   = null;
let bannerDone = false;

function loadState(){ try{ collection = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch{} }
function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(collection)); }catch{} }

/* ── Model ── */
async function loadModel(){
  document.getElementById('model-overlay').classList.remove('hidden');
  try{
    tfModel = await mobilenet.load({ version:1, alpha:1.0 });
    console.log('MobileNet ready');
  } catch(e){
    console.error(e);
    showToast('Model failed — check internet connection','#fb923c');
  }
  document.getElementById('model-overlay').classList.add('hidden');
  render();
}

/* ── Classify ── */
async function classify(imgEl){
  if(!tfModel){ showToast('Model not ready yet','#fb923c'); return null; }
  const preds = await tfModel.classify(imgEl, 5);
  const top   = preds[0];
  const label = top.className.split(',')[0].toLowerCase().trim();
  const info  = DB[label] || genericInfo(label);
  const rarity = getRarity(label);
  return {
    id: Date.now(),
    label,
    displayName: label.charAt(0).toUpperCase()+label.slice(1),
    confidence:  top.probability,
    rarity, rarityColor: RC[rarity],
    image: imgEl.src,
    scannedAt: new Date().toLocaleDateString('en-GB'),
    topPreds: preds.slice(0,3).map(p=>({ label:p.className.split(',')[0].trim(), prob:p.probability })),
    ...info,
  };
}

/* ── File handler ── */
function handleFile(e){
  const file = e.target.files[0];
  if(!file){ return; }
  e.target.value = '';
  const reader = new FileReader();
  reader.onload = async ()=>{
    previewSrc = reader.result;
    scanning   = true;
    lastResult = null;
    render();
    const img  = new Image();
    img.onload = async ()=>{
      const result = await classify(img);
      if(!result){ scanning=false; render(); return; }
      const isNew = !collection.some(c=>c.label===result.label);
      result.isNew = isNew;
      lastResult   = result;
      scanning     = false;
      if(isNew){
        collection.unshift(result);
        saveState();
        setTimeout(()=>showToast('✦ New: '+result.displayName, result.rarityColor), 80);
      }
      render();
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

function openCamera (){ document.getElementById('file-cam').click(); }
function openLibrary(){ document.getElementById('file-lib').click(); }
function fabTap(){ tfModel ? openCamera() : showToast('Model still loading…','#fb923c'); }

/* ── Modal ── */
function openModal(id){
  const f = collection.find(c=>c.id===id);
  if(!f) return;
  activeId = id;
  document.getElementById('m-img').src     = f.image;
  document.getElementById('m-name').textContent    = f.displayName;
  document.getElementById('m-habitat').textContent = f.habitat;
  document.getElementById('m-blooms').textContent  = f.bloom||'—';
  document.getElementById('m-desc').textContent    = f.desc||'';
  document.getElementById('m-fact').textContent    = f.fact||'';
  document.getElementById('m-fact-box').style.borderLeftColor = f.rarityColor;
  document.getElementById('m-date').textContent = 'Logged '+f.scannedAt;
  const rb = document.getElementById('m-rarity');
  rb.textContent = f.rarity; rb.style.background = f.rarityColor; rb.style.color='#000';
  if(f.confidence!=null){
    const p=Math.round(f.confidence*100);
    const col=f.confidence>.6?'#a8d878':f.confidence>.3?'#fb923c':'#f08080';
    document.getElementById('m-conf').innerHTML=
      `<span style="color:${col};font-size:12px">${p}% confidence</span>
       <div class="conf-bar-wrap" style="margin-top:5px"><div class="conf-bar" style="width:${p}%;background:${col}"></div></div>`;
  }
  document.getElementById('modal').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modal')){
    document.getElementById('modal').classList.add('hidden');
    document.body.style.overflow='';
    activeId=null;
  }
}
function deleteActive(){
  if(!activeId) return;
  collection = collection.filter(c=>c.id!==activeId);
  saveState(); closeModal(); render();
  showToast('Removed from collection');
}

/* ── Toast ── */
function showToast(msg,bg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=bg||'#a8d878'; t.style.color='#0a1a0a';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── View ── */
function setView(v){
  view=v; lastResult=null; previewSrc=null; scanning=false;
  document.getElementById('tab-col').classList.toggle('active',  v==='collection');
  document.getElementById('tab-scan').classList.toggle('active', v==='scanner');
  render();
}

/* ── Render ── */
function render(){
  const badge = document.getElementById('col-badge');
  if(collection.length){ badge.textContent=collection.length; badge.style.display='inline'; }
  else badge.style.display='none';
  document.getElementById('fab').classList.toggle('hidden', view!=='collection');
  document.getElementById('content').innerHTML = view==='collection' ? renderCollection() : renderScanner();
}

function renderCollection(){
  const rarities = ['All',...RARITIES];
  const chips = rarities.map(r=>{
    const col=RC[r]; const active=filter===r;
    return `<button class="chip${active?' active':''}" onclick="filter='${r}';render()"
              style="${col&&!active?`border-color:${col}55;color:${col}`:''}">
              ${r}</button>`;
  }).join('');

  const byR={};
  RARITIES.forEach(r=>byR[r]=0);
  collection.forEach(f=>{ if(byR[f.rarity]!==undefined) byR[f.rarity]++; });
  const topR = Object.entries(byR).filter(([,v])=>v>0).sort(([a],[b])=>RARITIES.indexOf(b)-RARITIES.indexOf(a));
  const statExtra = topR.length
    ? `<div class="stat"><div class="stat-val" style="color:${RC[topR[0][0]]}">${topR[0][1]}</div><div class="stat-key">${topR[0][0].toUpperCase()}</div></div>`
    : `<div class="stat"><div class="stat-val">—</div><div class="stat-key">RARE+</div></div>`;

  const isIOS = /iPhone|iPad/.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const banner = (!bannerDone && isIOS && !isStandalone) ? `
    <div class="install-banner">
      <span style="font-size:22px;flex-shrink:0">📲</span>
      <span>Tap <strong>Share → Add to Home Screen</strong> to install FlowerDex for full offline use.</span>
      <button onclick="bannerDone=true;render()">✕</button>
    </div>` : '';

  if(!collection.length) return `${banner}
    <div class="filters">${chips}</div>
    <div class="empty"><div class="icon">🌱</div>
      <div class="empty-title">No flowers logged yet</div>
      <div class="empty-sub">Tap the green button below to scan your first specimen</div>
    </div>`;

  const filtered = filter==='All' ? collection : collection.filter(f=>f.rarity===filter);
  const cards = filtered.map(f=>`
    <div class="card" onclick="openModal(${f.id})">
      <img src="${f.image}" alt="${f.displayName}" loading="lazy">
      <div class="card-body">
        <span class="card-rarity" style="background:${f.rarityColor};color:#000">${f.rarity}</span>
        <div class="card-name">${f.displayName}</div>
        ${f.confidence!=null?`<div class="card-conf">${Math.round(f.confidence*100)}% confidence</div>`:''}
        <div class="card-date">${f.scannedAt}</div>
      </div>
    </div>`).join('');
  const empty2 = !filtered.length ? `<div style="color:var(--dim);font-size:13px;grid-column:1/-1;text-align:center;padding:40px 0">No ${filter} flowers yet</div>` : '';

  return `${banner}
    <div class="stats-bar">
      <div class="stat"><div class="stat-val">${collection.length}</div><div class="stat-key">SPECIES</div></div>
      ${statExtra}
      <div class="stat"><div class="stat-val">${collection.length}</div><div class="stat-key">LOGGED</div></div>
    </div>
    <div class="filters">${chips}</div>
    <div class="grid">${cards}${empty2}</div>`;
}

function renderScanner(){
  const ready = !!tfModel;
  const vfInner = previewSrc
    ? `<img class="preview" src="${previewSrc}" alt="preview">`
    : `<div class="vf-placeholder"><div class="icon">${ready?'🌿':'⏳'}</div><p>${ready?'Tap Open Camera<br>to scan a flower':'AI model loading…'}</p></div>`;
  const overlay = scanning ? `<div class="vf-scanning"><div class="spinner"></div><span>ANALYZING…</span></div>` : '';
  const corners = !scanning ? `<div class="corner c-tl"></div><div class="corner c-tr"></div><div class="corner c-bl"></div><div class="corner c-br"></div>` : '';

  let resultHtml = '';
  if(lastResult){
    const r = lastResult;
    const p = Math.round(r.confidence*100);
    const col = r.confidence>.6?'#a8d878':r.confidence>.3?'#fb923c':'#f08080';
    const preds = r.topPreds ? `
      <div class="top-preds">
        <div class="info-label" style="margin-bottom:6px">TOP PREDICTIONS</div>
        ${r.topPreds.map(t=>`<div class="pred-row">
          <span>${t.label}</span>
          <div class="pred-mini-bar"><div class="pred-mini-fill" style="width:${Math.round(t.prob*100)}%"></div></div>
          <span>${Math.round(t.prob*100)}%</span>
        </div>`).join('')}
      </div>` : '';
    resultHtml = `
      <div class="result-card" style="border-color:${r.rarityColor}55">
        <div class="result-img-wrap">
          <img src="${r.image}" alt="${r.displayName}">
          <span class="badge-overlay badge-r" style="background:${r.rarityColor};color:#000">${r.rarity}</span>
          <span class="badge-overlay badge-l" style="background:${r.isNew?'#a8d878':'rgba(0,0,0,.6)'};color:${r.isNew?'#0a1a0a':'#a0a0a0'}">${r.isNew?'✦ NEW':'Already logged'}</span>
        </div>
        <div class="result-body">
          <div class="flower-name">${r.displayName}</div>
          <span style="color:${col};font-size:12px">${p}% confidence</span>
          <div class="conf-bar-wrap" style="margin:6px 0 12px"><div class="conf-bar" style="width:${p}%;background:${col}"></div></div>
          <div class="flower-desc">${r.desc||''}</div>
          <div class="info-grid">
            <div class="info-cell"><div class="info-label">HABITAT</div><div class="info-val">${r.habitat}</div></div>
            <div class="info-cell"><div class="info-label">BLOOMS</div><div class="info-val">${r.bloom||'—'}</div></div>
          </div>
          <div class="fun-fact" style="border-left-color:${r.rarityColor}">
            <div class="info-label">FUN FACT</div><p>${r.fact||''}</p>
          </div>
          ${preds}
        </div>
      </div>`;
  }

  return `<div class="scanner">
    <div class="viewfinder">${vfInner}${overlay}${corners}</div>
    <div class="scan-actions">
      <button class="btn" onclick="openCamera()"  ${!ready||scanning?'disabled':''}>📷 ${lastResult?'Scan Another':'Open Camera'}</button>
      <button class="btn btn-ghost" onclick="openLibrary()" ${!ready||scanning?'disabled':''} title="From library">🖼️</button>
    </div>
    ${!ready?'<div class="alert">⏳ Downloading AI model (once only, ~17 MB). Stay connected for a moment.</div>':''}
    ${resultHtml}
  </div>`;
}

/* ── Service Worker ── */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js')
      .then(r=>console.log('SW scope:',r.scope))
      .catch(e=>console.warn('SW:',e));
  });
}

/* ── Boot ── */
loadState();
render();
window.addEventListener('load', ()=>{
  const tryLoad = ()=>{
    if(typeof mobilenet !== 'undefined'){ loadModel(); }
    else{ setTimeout(tryLoad, 200); }
  };
  tryLoad();
});
</script>
</body>
</html>
